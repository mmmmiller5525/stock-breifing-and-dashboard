<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>简报 · MILLER</title>
<style>
  :root {
    --bg: #0f1419; --bg-elev: #1a1f29; --border: #2a3038;
    --text: #e4e6eb; --text-dim: #8a8f99; --accent: #4a9eff;
    --gain: #ef5350; --loss: #26a69a;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    background: var(--bg); color: var(--text); line-height: 1.7; min-height: 100vh;
  }
  .container { max-width: 880px; margin: 0 auto; padding: 24px 20px; }
  header { border-bottom: 1px solid var(--border); padding-bottom: 16px; margin-bottom: 24px; display: flex; justify-content: space-between; align-items: baseline; }
  h1 { font-size: 20px; font-weight: 600; }
  .back { color: var(--accent); text-decoration: none; font-size: 13px; }
  .back:hover { text-decoration: underline; }
  article { background: var(--bg-elev); border: 1px solid var(--border); border-radius: 8px; padding: 28px 32px; }
  article h1 { font-size: 22px; margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid var(--border); }
  article h2 { font-size: 17px; margin: 28px 0 12px; color: var(--accent); }
  article h3 { font-size: 15px; margin: 20px 0 8px; color: var(--text); }
  article p { margin: 10px 0; color: var(--text); }
  article strong { color: #ffd54f; font-weight: 600; }
  article ul, article ol { margin: 10px 0 10px 24px; }
  article li { margin: 4px 0; color: var(--text); }
  article table { width: 100%; border-collapse: collapse; margin: 14px 0; font-size: 13px; }
  article th, article td { padding: 8px 10px; border-bottom: 1px solid var(--border); text-align: left; }
  article th { color: var(--text-dim); font-weight: 600; background: rgba(255,255,255,0.02); }
  article hr { border: none; border-top: 1px solid var(--border); margin: 24px 0; }
  article code { background: rgba(255,255,255,0.06); padding: 1px 6px; border-radius: 3px; font-family: ui-monospace, "Cascadia Mono", "Consolas", monospace; font-size: 0.92em; }
  article blockquote { border-left: 3px solid var(--accent); padding-left: 14px; color: var(--text-dim); margin: 12px 0; }
  footer { margin-top: 32px; padding-top: 16px; border-top: 1px solid var(--border); color: var(--text-dim); font-size: 12px; text-align: center; }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1 id="title">载入中...</h1>
    <a class="back" href="/">← 返回列表</a>
  </header>
  <article id="content">载入中...</article>
  <footer>
    数据 15-20 分钟延迟，仅供参考，不构成投资建议<br>
    mavis cron 自动生成 · Vercel 托管
  </footer>
</div>

<script>
function escapeHtml(s) {
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function inline(s) {
  s = s.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
  s = s.replace(/\*([^*]+)\*/g, '<em>$1</em>');
  s = s.replace(/`([^`]+)`/g, '<code>$1</code>');
  return s;
}

function renderMarkdown(md) {
  const lines = md.split('\n');
  let html = '';
  let inTable = false;
  let tableRows = [];
  let inList = false;
  let listType = 'ul';

  function flushTable() {
    if (tableRows.length === 0) return;
    html += '<table>';
    html += '<thead><tr>' + tableRows[0].map(c => `<th>${inline(escapeHtml(c.trim()))}</th>`).join('') + '</tr></thead>';
    html += '<tbody>';
    for (let i = 2; i < tableRows.length; i++) {
      html += '<tr>' + tableRows[i].map(c => `<td>${inline(escapeHtml(c.trim()))}</td>`).join('') + '</tr>';
    }
    html += '</tbody></table>';
    tableRows = [];
    inTable = false;
  }

  function flushList() {
    html += listType === 'ol' ? '</ol>' : '</ul>';
    inList = false;
  }

  for (let i = 0; i < lines.length; i++) {
    const line = lines[i];
    const trimmed = line.trim();

    if (trimmed.startsWith('|') && trimmed.endsWith('|')) {
      if (inList) flushList();
      const cells = trimmed.slice(1, -1).split('|');
      tableRows.push(cells);
      inTable = true;
      continue;
    } else if (inTable) {
      flushTable();
    }

    if (/^---+$/.test(trimmed)) {
      if (inList) flushList();
      html += '<hr>';
      continue;
    }

    if (/^###\s+/.test(trimmed)) {
      if (inList) flushList();
      html += `<h3>${inline(escapeHtml(trimmed.replace(/^###\s+/, '')))}</h3>`;
      continue;
    }
    if (/^##\s+/.test(trimmed)) {
      if (inList) flushList();
      html += `<h2>${inline(escapeHtml(trimmed.replace(/^##\s+/, '')))}</h2>`;
      continue;
    }
    if (/^#\s+/.test(trimmed)) {
      if (inList) flushList();
      html += `<h1>${inline(escapeHtml(trimmed.replace(/^#\s+/, '')))}</h1>`;
      continue;
    }

    const olMatch = /^(\d+)\.\s+(.+)/.exec(trimmed);
    const ulMatch = /^[-*]\s+(.+)/.exec(trimmed);
    if (olMatch) {
      if (!inList || listType !== 'ol') { if (inList) flushList(); html += '<ol>'; inList = true; listType = 'ol'; }
      html += `<li>${inline(escapeHtml(olMatch[2]))}</li>`;
      continue;
    }
    if (ulMatch) {
      if (!inList || listType !== 'ul') { if (inList) flushList(); html += '<ul>'; inList = true; listType = 'ul'; }
      html += `<li>${inline(escapeHtml(ulMatch[1]))}</li>`;
      continue;
    }
    if (inList) flushList();

    if (trimmed === '') { html += ''; continue; }
    html += `<p>${inline(escapeHtml(trimmed))}</p>`;
  }
  if (inTable) flushTable();
  if (inList) flushList();
  return html;
}

async function load() {
  const params = new URLSearchParams(location.search);
  const filename = params.get('f');
  if (!filename) {
    document.getElementById('content').innerHTML = '<p>缺少文件参数 ?f=...</p>';
    return;
  }
  document.getElementById('title').textContent = filename.replace(/\.md$/, '');

  try {
    const res = await fetch('/api/briefings');
    const data = await res.json();
    const file = (data.files || []).find(f => f.name === filename);
    if (!file) {
      document.getElementById('content').innerHTML = '<p>文件不存在</p>';
      return;
    }
    const md = await fetch(file.url, { cache: 'no-store' }).then(async r => {
      if (!r.ok) throw new Error('HTTP ' + r.status);
      const buf = await r.arrayBuffer();
      return new TextDecoder('utf-8').decode(buf);
    });
    document.getElementById('content').innerHTML = renderMarkdown(md);
  } catch (e) {
    document.getElementById('content').innerHTML = '<p>载入失败：' + escapeHtml(e.message) + '</p>';
  }
}

load();
</script>
</body>
</html>
